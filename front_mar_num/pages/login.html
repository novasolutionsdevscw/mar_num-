<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión | Tienda Mar & Num</title>
    <meta name="description" content="Accede a tu cuenta de Tienda Mar & Num para gestionar ventas, clientes y productos." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
        /* ─── Variables — Paleta Cálida ─────────────────────────────── */
        :root {
            --linen:       #F5F1EA;
            --khaki:       #D7C9B8;
            --camel:       #B2967D;
            --cocoa:       #7D5A44;
            --espresso:    #4A342A;

            --text-dark:   #2C1A12;
            --text-mid:    #6B4C38;
            --text-light:  #A08070;
            --white:       #FFFFFF;

            --input-bg:    rgba(213,201,184,0.18);
            --input-border:rgba(178,150,125,0.35);
            --input-focus: rgba(125,90,68,0.50);
            --shadow-warm: 0 20px 60px rgba(74,52,42,0.18);
            --radius:      12px;
            --transition:  0.25s cubic-bezier(0.4,0,0.2,1);
        }

        /* ─── Reset ─────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--linen);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ═══════════════════════════════════════════════════════════════
           PANEL IZQUIERDO — Imagen
        ═══════════════════════════════════════════════════════════════ */
        .panel-image {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .panel-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* Overlay degradado sobre la imagen */
        .panel-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(74,52,42,0.45) 0%,
                rgba(125,90,68,0.20) 60%,
                rgba(74,52,42,0.10) 100%
            );
        }

        /* Texto sobre la imagen */
        .panel-image-text {
            position: absolute;
            bottom: 48px;
            left: 44px;
            z-index: 2;
            color: var(--white);
        }

        .panel-image-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 2px 20px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }

        .panel-image-text p {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.88;
            text-shadow: 0 1px 8px rgba(0,0,0,0.4);
        }

        /* Badge decorativo */
        .image-badge {
            position: absolute;
            top: 36px;
            left: 44px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .image-badge-icon {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.20);
            backdrop-filter: blur(8px);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.30);
        }

        .image-badge-icon svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        .image-badge-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 8px rgba(0,0,0,0.35);
        }

        /* ═══════════════════════════════════════════════════════════════
           PANEL DERECHO — Formulario
        ═══════════════════════════════════════════════════════════════ */
        .panel-form {
            width: 480px;
            flex-shrink: 0;
            background: var(--linen);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 52px 52px;
            overflow-y: auto;
            position: relative;
        }

        /* Detalle decorativo vertical izquierdo */
        .panel-form::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, var(--camel), var(--cocoa), var(--espresso));
            border-radius: 0 4px 4px 0;
        }

        .form-inner {
            width: 100%;
            max-width: 360px;
            animation: fadeSlide 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateX(24px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ─── Logo / Marca ──────────────────────────────────────────── */
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 44px;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--camel), var(--espresso));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(74,52,42,0.30);
            flex-shrink: 0;
        }

        .brand-icon svg { width: 26px; height: 26px; fill: #fff; }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--espresso);
            line-height: 1;
            margin-bottom: 3px;
        }
        .brand-tagline {
            font-size: 0.75rem;
            color: var(--text-light);
            font-weight: 400;
            letter-spacing: 0.03em;
        }

        /* ─── Encabezado del formulario ─────────────────────────────── */
        .form-heading { margin-bottom: 32px; }

        .form-heading h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--espresso);
            margin-bottom: 6px;
        }

        .form-heading p {
            font-size: 0.875rem;
            color: var(--text-light);
        }

        /* ─── Separador decorativo ──────────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .divider-line { flex: 1; height: 1px; background: var(--khaki); }
        .divider-dot  { width: 6px; height: 6px; background: var(--camel); border-radius: 50%; }

        /* ─── Grupos de campo ───────────────────────────────────────── */
        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--camel);
            width: 18px;
            height: 18px;
            pointer-events: none;
            transition: color var(--transition);
        }

        .form-input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: var(--radius);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            outline: none;
            transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
        }

        .form-input::placeholder { color: var(--text-light); }

        .form-input:focus {
            border-color: var(--cocoa);
            background: rgba(215,201,184,0.28);
            box-shadow: 0 0 0 4px rgba(125,90,68,0.12);
        }

        .input-wrapper:focus-within .input-icon { color: var(--cocoa); }

        /* Toggle contraseña */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--camel);
            display: flex;
            align-items: center;
            padding: 0;
            transition: color var(--transition);
        }
        .toggle-password:hover { color: var(--cocoa); }
        .toggle-password svg { width: 18px; height: 18px; }

        /* ─── Alerta de error ───────────────────────────────────────── */
        .alert-error {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(178,96,74,0.10);
            border: 1px solid rgba(178,96,74,0.30);
            border-radius: 10px;
            padding: 11px 14px;
            color: #7a3e2a;
            font-size: 0.85rem;
            margin-bottom: 20px;
            animation: fadeIn 0.2s ease;
        }
        .alert-error.visible { display: flex; }
        .alert-error svg { flex-shrink: 0; width: 16px; height: 16px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Botón Principal ───────────────────────────────────────── */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--cocoa) 0%, var(--espresso) 100%);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
            transition: transform var(--transition), box-shadow var(--transition);
            box-shadow: 0 6px 24px rgba(74,52,42,0.35);
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 0.5s ease;
        }
        .btn-login:hover::before { left: 100%; }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(74,52,42,0.45);
        }
        .btn-login:active  { transform: translateY(0); }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-content, .btn-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-loading { display: none; }
        .btn-login.loading .btn-content { display: none; }
        .btn-login.loading .btn-loading { display: flex; }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Footer ────────────────────────────────────────────────── */
        .form-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--khaki);
        }
        .form-footer p { font-size: 0.78rem; color: var(--text-light); }
        .form-footer strong { color: var(--cocoa); font-weight: 500; }

        /* Decoración de puntos */
        .dots-decoration {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
        }
        .dots-decoration span {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--khaki);
        }
        .dots-decoration span:nth-child(2) { background: var(--camel); }
        .dots-decoration span:nth-child(3) { background: var(--cocoa); }

        /* ─── Responsive ────────────────────────────────────────────── */
        @media (max-width: 820px) {
            body { flex-direction: column; height: auto; overflow: auto; }
            .panel-image { height: 220px; flex: none; }
            .panel-form {
                width: 100%;
                padding: 40px 28px;
            }
            .panel-form::before { display: none; }
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-7px); }
            40%      { transform: translateX(7px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }
    </style>
</head>
<body>

    <!-- ══════════════════ PANEL IZQUIERDO — Imagen ══════════════════ -->
    <div class="panel-image">
        <img
            src="../assets/images/img_marnum.jpg"
            alt="Tienda Mar y Num"
            loading="eager"
        />

        <!-- Badge superior -->
        <div class="image-badge">
            <div class="image-badge-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zm1.5 0h9L19 5H5l2.5-3zM12 12a3 3 0 110-6 3 3 0 010 6z"/>
                </svg>
            </div>
            <span class="image-badge-label">Mar &amp; Num</span>
        </div>

        <!-- Texto inferior -->
        <div class="panel-image-text">
            <h2>Tu tienda,<br />en un solo lugar.</h2>
            <p>Gestiona ventas, clientes y productos fácilmente.</p>
        </div>
    </div>

    <!-- ══════════════════ PANEL DERECHO — Formulario ════════════════ -->
    <div class="panel-form">
        <div class="form-inner">

            <!-- Marca -->
            <div class="brand">
                <div class="brand-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zm1.5 0h9L19 5H5l2.5-3zM12 12a3 3 0 110-6 3 3 0 010 6z"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <div class="brand-name">Mar &amp; Num</div>
                    <div class="brand-tagline">Sistema de gestión</div>
                </div>
            </div>

            <!-- Encabezado -->
            <div class="form-heading">
                <h1>Bienvenido 👋</h1>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <!-- Divisor decorativo -->
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-dot"></div>
                <div class="divider-line"></div>
            </div>

            <!-- Alerta de error -->
            <div class="alert-error" id="alertError" role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                </svg>
                <span id="errorMessage">Usuario o contraseña incorrectos.</span>
            </div>

            <!-- Formulario -->
            <form id="loginForm" novalidate autocomplete="on">

                <!-- Usuario -->
                <div class="form-group">
                    <label class="form-label" for="usuario">Usuario</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="usuario"
                            name="usuario"
                            class="form-input"
                            placeholder="Tu nombre de usuario"
                            autocomplete="username"
                            autocapitalize="none"
                            spellcheck="false"
                            required
                        />
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        />
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Ver contraseña">
                            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Botón Ingresar -->
                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-content">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                        </svg>
                        Ingresar al sistema
                    </span>
                    <span class="btn-loading">
                        <span class="spinner"></span>
                        Verificando...
                    </span>
                </button>

            </form>

            <!-- Footer -->
            <div class="form-footer">
                <p>¿Problemas para ingresar?</p>
                <p><strong>Contacta al administrador del sistema</strong></p>
                <div class="dots-decoration">
                    <span></span><span></span><span></span>
                </div>
            </div>

        </div>
    </div>

    <!-- Servicio de autenticación -->
    <script src="../services/auth.service.js"></script>

    <script>
        // ─── Redirigir si ya está autenticado ────────────────────────
        if (AuthService.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        // ─── Referencias ─────────────────────────────────────────────
        const loginForm    = document.getElementById('loginForm');
        const usuarioInput = document.getElementById('usuario');
        const passwordInput= document.getElementById('password');
        const btnLogin     = document.getElementById('btnLogin');
        const alertError   = document.getElementById('alertError');
        const errorMessage = document.getElementById('errorMessage');
        const togglePass   = document.getElementById('togglePassword');
        const eyeOpen      = document.getElementById('eyeOpen');
        const eyeClosed    = document.getElementById('eyeClosed');

        // ─── Toggle ver/ocultar contraseña ───────────────────────────
        togglePass.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeOpen.style.display   = isPassword ? 'none'  : '';
            eyeClosed.style.display = isPassword ? ''      : 'none';
            togglePass.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Ver contraseña');
        });

        // ─── Ocultar error al escribir ────────────────────────────────
        [usuarioInput, passwordInput].forEach(input => {
            input.addEventListener('input', () => alertError.classList.remove('visible'));
        });

        // ─── Mostrar error con shake ──────────────────────────────────
        function showError(msg) {
            errorMessage.textContent = msg;
            alertError.classList.add('visible');
            const inner = document.querySelector('.form-inner');
            inner.style.animation = 'none';
            inner.offsetHeight; // reflow
            inner.style.animation = 'shake 0.4s ease';
        }

        // ─── Submit ───────────────────────────────────────────────────
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const usuario  = usuarioInput.value.trim();
            const password = passwordInput.value;

            if (!usuario || !password) {
                showError('Por favor completa todos los campos.');
                return;
            }

            btnLogin.disabled = true;
            btnLogin.classList.add('loading');
            alertError.classList.remove('visible');

            try {
                // El AuthService envía { email, password } → ajustamos para enviar { usuario, password }
                await AuthService.loginConUsuario(usuario, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showError(error.message || 'Usuario o contraseña incorrectos.');
            } finally {
                btnLogin.disabled = false;
                btnLogin.classList.remove('loading');
            }
        });
    </script>

</body>
</html>
